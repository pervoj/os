image: quay.io/containers/podman

before_script:
  - podman login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY

stages:
  - build
  - push
  - sign

build:
  stage: build
  script:
    - podman build --tag $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA --tag $CI_REGISTRY_IMAGE:latest .
    - podman push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA
    - podman push $CI_REGISTRY_IMAGE:latest

sign:
  stage: sign
  dependencies:
    - build
  before_script:
    - COSIGN_VERSION=$(curl -s https://api.github.com/repos/sigstore/cosign/releases/latest | jq -r .tag_name)
    - curl -O -L "https://github.com/sigstore/cosign/releases/latest/download/cosign-${COSIGN_VERSION}.x86_64.rpm"
    - rpm -ivh cosign-${LATEST_VERSION}.x86_64.rpm
  script:
    - IMAGE_DIGEST=$(podman inspect --format='{{index .RepoDigests 0}}' $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA)
    - cosign sign -y --key $COSIGN_PRIVATE_KEY $IMAGE_DIGEST
