name: Build
on:
  push:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'  # every day at midnight

env:
  REGISTRY_USER: ${{ github.actor }}
  REGISTRY_PASSWORD: ${{ github.token }}
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}
  IMAGE_NAME: os

jobs:
  build:
    name: Build and push image
    runs-on: ubuntu-latest

    # permissions:
    #   contents: read
    #   packages: write
    #   id-token: write

    steps:
      - name: Checkout the repository
        uses: actions/checkout@v3

      - name: Generate tags
        id: generate-tags
        shell: bash
        run: |
          TAGS=("$(git rev-parse --short HEAD)")

          BRANCH="$(git branch | sed -e '/^[^*]/d' -e 's/* \(.*\)/\1/')"
          if [[ "$BRANCH" == "main" ]]; then
            TAGS+=("latest")
            TAGS+=("$(TZ='Europe/Prague' date +%Y%m%d)")
          else
            TAGS+=("$BRANCH")
          fi

          echo "tags=${TAGS[*]}" >> $GITHUB_OUTPUT

      - name: Build packages
        run: |
          sh packages/local-build.sh
          cp -r packages/output/* files

      - name: Build image
        id: build_image
        uses: redhat-actions/buildah-build@v2
        with:
          containerfiles: |
            ./Containerfile
          image: ${{ env.IMAGE_NAME }}
          tags: ${{ steps.generate-tags.outputs.tags }}
          oci: false

      - name: Log in to ghcr.io
        uses: redhat-actions/podman-login@v1
        with:
          username: ${{ env.REGISTRY_USER }}
          password: ${{ env.REGISTRY_PASSWORD }}
          registry: ${{ env.IMAGE_REGISTRY }}

      - name: Push to ghcr.io
        uses: redhat-actions/push-to-registry@v2
        id: push
        with:
          image: ${{ steps.build_image.outputs.image }}
          tags: ${{ steps.build_image.outputs.tags }}
          registry: ${{ env.IMAGE_REGISTRY }}
          extra-args: |
            --disable-content-trust

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        run: |
          cosign sign -y --key env://COSIGN_PRIVATE_KEY ${IMAGE}@${TAGS}
        env:
          IMAGE: ${{ env.IMAGE_REGISTRY }}/${{ steps.build_image.outputs.image }}
          TAGS: ${{ steps.push.outputs.digest }}
          COSIGN_EXPERIMENTAL: false
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}

      - name: Echo outputs
        run: |
          echo "${{ toJSON(steps.push.outputs) }}"
